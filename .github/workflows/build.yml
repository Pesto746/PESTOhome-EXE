name: Build Pesto Windows App
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Nativefier
        run: npm install -g nativefier

      - name: Run Build
        shell: bash
        run: |
          nativefier --name "PestoHome" \
          --icon "logo.jpg" \
          --inject "toolbar.js" \
          --platform "windows" \
          "https://github.io"

      - name: List files for debugging
        run: dir

      - name: Save App as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PestoHome-Desktop
          path: PestoHome-win32-* 
