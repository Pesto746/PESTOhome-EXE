name: Build Pesto Windows App
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Nativefier
        run: npm install -g nativefier

      - name: Run Build
        shell: bash
        run: |
          # --icon points to the image file in your repo (make sure the filename matches)
          # --internal-urls and --strict-internal-urls keep page 2 inside the app
          nativefier "https://github.io" \
          --name "PestoHome" \
          --platform "windows" \
          --icon "./icon.png" \
          --internal-urls ".*pesto746\.github\.io.*" \
          --strict-internal-urls \
          --inject "./toolbar.js" \
          --overwrite \
          ./output_app/

      - name: Verify Output
        run: dir output_app

      - name: Save App as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PestoHome-Desktop-App
          path: output_app/
