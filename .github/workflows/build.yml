name: Build Pesto Windows App
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Nativefier
        run: npm install -g nativefier

      - name: Run Build
        shell: bash
        run: |
          # We removed the --icon flag to prevent the 'Exit Code 1' crash
          # The ".*?" rule ensures Page 2 stays inside the app
          nativefier "https://github.io" \
          --name "PestoHome" \
          --platform "windows" \
          --internal-urls ".*?" \
          --inject "./toolbar.js" \
          --overwrite \
          ./output_app/

      - name: Save App as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PestoHome-Desktop-App
          path: ./*PestoHome-win32-x64/
