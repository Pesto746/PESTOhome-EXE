name: Build Pesto Windows App
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Reverting to 20 to stop the "Force" warning; it's still valid until Sept 2026

      - name: Install Nativefier
        run: npm install -g nativefier

      - name: Run Build
        shell: bash
        run: |
          nativefier --name "PestoHome" \
          --icon "logo.jpg" \
          --inject "toolbar.js" \
          --platform "windows" \
          "https://github.io"

      - name: Debug - List all folders
        run: ls -R

      - name: Save App as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PestoHome-Desktop-App
          # This tells GitHub: "Find any folder that contains an .exe file"
          path: ./**/*win32*/
