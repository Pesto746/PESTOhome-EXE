name: Build Pesto Windows App
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Nativefier
        run: npm install -g nativefier

      - name: Run Build
        shell: bash
        run: |
          # We'll let Nativefier choose the folder name to avoid path errors
          nativefier "https://github.io" \
          --name "PestoHome" \
          --platform "windows" \
          --internal-urls ".*?" \
          --inject "./toolbar.js" \
          --overwrite

      - name: List Files (Debug)
        run: dir

      - name: Save App as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PestoHome-Desktop-App
          # This captures any folder containing the word "PestoHome"
          path: ./*PestoHome*/
