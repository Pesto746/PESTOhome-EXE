name: Build Pesto Windows App
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Nativefier
        run: npm install -g nativefier

      - name: Run Build
        shell: bash
        run: |
          # Using $GITHUB_WORKSPACE ensures the app finds your icon and js files
          nativefier "https://github.io" \
          --name "PestoHome" \
          --platform "windows" \
          --icon "$GITHUB_WORKSPACE/icon.png" \
          --internal-urls ".*?" \
          --inject "$GITHUB_WORKSPACE/toolbar.js" \
          --overwrite \
          ./output_app/

      - name: Save App as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PestoHome-Desktop-App
          path: output_app/
